<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#09090b" />
    </radialGradient>
    <!-- Cyan Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  
  <!-- Outer Rounded Rect -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Decorative Glowing Audio Waves in Background -->
  <g opacity="0.25" stroke="#22d3ee" stroke-width="6" stroke-linecap="round">
    <line x1="120" y1="256" x2="120" y2="256" />
    <line x1="160" y1="200" x2="160" y2="312" />
    <line x1="200" y1="160" x2="200" y2="352" />
    <line x1="240" y1="120" x2="240" y2="392" />
    <line x1="280" y1="160" x2="280" y2="352" />
    <line x1="320" y1="200" x2="320" y2="312" />
    <line x1="360" y1="240" x2="360" y2="272" />
  </g>

  <!-- Glowing Scissor Core Graphic -->
  <g filter="url(#glow)">
    <!-- Scissor Blades -->
    <path d="M190 200 L340 330" stroke="url(#cyanGrad)" stroke-width="24" stroke-linecap="round" />
    <path d="M190 312 L340 182" stroke="url(#cyanGrad)" stroke-width="24" stroke-linecap="round" />
    <!-- Pivot screw -->
    <circle cx="256" cy="256" r="14" fill="#ffffff" stroke="#22d3ee" stroke-width="4" />
    <!-- Handle Loops -->
    <circle cx="160" cy="180" r="32" fill="none" stroke="url(#cyanGrad)" stroke-width="16" />
    <circle cx="160" cy="332" r="32" fill="none" stroke="url(#cyanGrad)" stroke-width="16" />
  </g>
</svg>
